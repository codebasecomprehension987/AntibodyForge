# configs/default.yaml  (JAX version)
# =====================================
# Default configuration for AntibodyForge (JAX/Flax).

# ── Model architecture ────────────────────────────────────────────────────
d_model:      256
n_heads:      8
n_layers:     6
ffn_dim:      1024
dropout_rate: 0.1        # Flax uses dropout_rate not dropout

# ── Beam search ───────────────────────────────────────────────────────────
beam_width:     10000
max_cdr_len:    28
length_penalty: 0.6
top_k_results:  10
n_slab_slots:   300000

# ── Surrogate ΔG scorer ───────────────────────────────────────────────────
max_candidates:    1000
n_rosetta_threads: 8

# ── Structure processing ──────────────────────────────────────────────────
epitope_cutoff_A:  6.0
numbering_scheme:  kabat

# ── JAX-specific ──────────────────────────────────────────────────────────
seed: 42              # JAX PRNG seed (explicit key management)
# Note: no `device` field — JAX device placement is handled via
# jax.default_device() or environment variable XLA_PYTHON_CLIENT_PREALLOCATE
